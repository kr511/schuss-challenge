name: Apply legacy realtime cleanup

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run cleanup
        run: node scripts/remove-legacy-realtime.cjs

      - name: Commit cleanup result to main
        run: |
          if git diff --quiet; then
            echo "No cleanup changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html friends.js app.js
          git commit -m "Apply legacy realtime cleanup"
          git push origin HEAD:main
