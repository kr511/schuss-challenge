<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Schützen Challenge – Reset</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #071006;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(122,176,48,.35);
      border-radius: 20px;
      padding: 24px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 10px; font-size: 1.4rem; }
    p { color: rgba(255,255,255,.72); line-height: 1.45; }
    button, a {
      display: inline-block;
      margin-top: 14px;
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      background: linear-gradient(135deg,#00c3ff,#7ab030);
      color: #061006;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .status { margin-top: 12px; font-size: .86rem; color: rgba(255,255,255,.55); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Schützen Challenge wird repariert</h1>
    <p>Diese Seite löscht den alten PWA-Cache und den alten Service Worker. Danach wird die App frisch geladen.</p>
    <button id="resetBtn">Jetzt Cache zurücksetzen</button>
    <div class="status" id="status">Bereit.</div>
  </main>

  <script>
    async function resetApp() {
      const status = document.getElementById('status');
      status.textContent = 'Lösche Cache und Service Worker…';

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }

        status.textContent = 'Fertig. Lade App neu…';
        setTimeout(() => {
          window.location.href = './index.html?fresh=' + Date.now();
        }, 700);
      } catch (err) {
        status.textContent = 'Reset fehlgeschlagen: ' + (err && err.message ? err.message : err);
      }
    }

    document.getElementById('resetBtn').addEventListener('click', resetApp);
    resetApp();
  </script>
</body>
</html>
